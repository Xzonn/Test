name: Build and Publish

on:
  push:
    branches: 
      - master
  workflow_call:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - continue-on-error: true
        run: |
          python script.py
      - continue-on-error: true
        run: |
          python script.py
        env:
          PYTHONUTF8: 1